<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Projects Collection</title>
    <link rel="stylesheet" href="mini-projects.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Mini Projects Collection</h1>
        <p>Four small interactive web apps built with HTML, CSS, and JavaScript.</p>
      </header>

      <section class="grid">
        <article class="card">
          <h2>Counter App</h2>
          <p class="value" id="counter-value">0</p>
          <div class="buttons">
            <button class="btn" id="decrement">-</button>
            <button class="btn reset" id="reset">Reset</button>
            <button class="btn" id="increment">+</button>
          </div>
        </article>

        <article class="card">
          <h2>Digital Clock</h2>
          <p class="clock" id="clock-display">--:--:--</p>
          <p class="muted">Live time display</p>
        </article>

        <article class="card color-card">
          <h2>Random Background Color</h2>
          <div class="color-box" id="color-preview"></div>
          <p class="color-code" id="color-code">#ffffff</p>
          <button class="btn full" id="color-btn">Generate Color</button>
        </article>

        <article class="card">
          <h2>Simple Calculator</h2>
          <div class="calculator">
            <input type="number" id="num1" placeholder="First number" />
            <input type="number" id="num2" placeholder="Second number" />
            <div class="buttons calc-buttons">
              <button class="btn" data-op="add">+</button>
              <button class="btn" data-op="subtract">-</button>
              <button class="btn" data-op="multiply">×</button>
              <button class="btn" data-op="divide">÷</button>
            </div>
            <p class="result" id="result">Result: 0</p>
          </div>
        </article>
      </section>
    </main>

    <script src="mini-projects.js"></script>
  </body>
</html>
